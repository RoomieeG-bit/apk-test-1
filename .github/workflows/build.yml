name: Build APK FIX FINAL AIDL + SDK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DEBIAN_FRONTEND: noninteractive
      BUILDOZER_ALLOW_ROOT: 1
      ANDROIDSDK: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:

    # =========================
    # CHECKOUT
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # PYTHON
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # =========================
    # SYSTEM DEPENDENCIES
    # =========================
    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y git zip unzip wget curl openjdk-17-jdk \
        build-essential autoconf automake libtool m4 \
        libffi-dev libssl-dev python3-dev cmake

    # =========================
    # PYTHON DEPENDENCIES
    # =========================
    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36 buildozer==1.5.0

    # =========================
    # INSTALL ANDROID SDK (CMDLINE TOOLS)
    # =========================
    - name: Install Android SDK
      run: |
        mkdir -p $ANDROIDSDK
        cd $ANDROIDSDK

        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-*.zip -d cmdline-tools
        mv cmdline-tools/cmdline-tools cmdline-tools/latest

        export PATH=$ANDROIDSDK/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses || true

        sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"

    # =========================
    # FIX SDKMANAGER PATH (IMPORTANT)
    # =========================
    - name: Fix sdkmanager path for Buildozer
      run: |
        mkdir -p $ANDROIDSDK/tools/bin
        ln -sf $ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager \
              $ANDROIDSDK/tools/bin/sdkmanager

    # =========================
    # LINK SDK TO BUILDOZER (CRITICAL FIX)
    # =========================
    - name: Force Buildozer SDK path
      run: |
        mkdir -p ~/.buildozer/android/platform
        ln -sf $ANDROIDSDK ~/.buildozer/android/platform/android-sdk

    # =========================
    # CLEAN CACHE
    # =========================
    - name: Clean build cache
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer
        rm -rf bin

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      run: |
        export ANDROIDAPI=34
        export ANDROIDMINAPI=21
        export ANDROIDSDK=$ANDROIDSDK
        export ANDROID_SDK_ROOT=$ANDROIDSDK

        buildozer android debug -v

    # =========================
    # DEBUG OUTPUT
    # =========================
    - name: Check output
      run: |
        echo "=== APK BIN ==="
        ls -R bin || true

        echo "=== BUILDOZER FOLDER ==="
        ls -R .buildozer || true

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
