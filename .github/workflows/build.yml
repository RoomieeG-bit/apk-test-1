name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget curl \
            openjdk-17-jdk \
            build-essential

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install cython==0.29.36 buildozer==1.5.0
          pip install kivy==2.3.0 kivymd==1.2.0

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
