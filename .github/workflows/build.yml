name: Build APK (P4A HARD RESET FIX)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DEBIAN_FRONTEND: noninteractive
      BUILDOZER_ALLOW_ROOT: 1

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip wget curl \
          openjdk-17-jdk \
          build-essential autoconf automake libtool m4 \
          libffi-dev libssl-dev python3-dev cmake

    - name: Install Python tools (PIN VERSION)
      run: |
        pip install --upgrade pip
        pip install cython
        pip install buildozer==1.5.0
        pip install python-for-android==2023.9.16
        pip install kivy

    # 🔥 HARD RESET PENTING
    - name: Clean ALL buildozer cache
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer

    # 🔥 FORCE RECREATE P4A
    - name: Force recreate p4a
      run: |
        buildozer android clean || true
        rm -rf .buildozer/android/platform/python-for-android || true

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
