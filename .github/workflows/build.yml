name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILDOZER_ALLOW_ROOT: 1
      ANDROIDSDK: ${{ github.workspace }}/android-sdk
      DEBIAN_FRONTEND: noninteractive

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y git zip unzip wget curl openjdk-17-jdk \
        build-essential autoconf automake libtool m4 \
        libffi-dev libssl-dev python3-dev cmake

    - name: Install Python deps
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36 buildozer==1.5.0

    # =========================
    # ANDROID SDK FIX (INI YANG KAMU KURANG)
    # =========================
    - name: Install Android SDK
      run: |
        mkdir -p $ANDROIDSDK/cmdline-tools
        cd $ANDROIDSDK

        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-*.zip -d cmdline-tools
        mv cmdline-tools/cmdline-tools cmdline-tools/latest

        yes | cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROIDSDK --licenses || true

        cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROIDSDK \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"

    - name: Clean build
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer

    - name: Build APK
      run: |
        buildozer android debug -v

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
