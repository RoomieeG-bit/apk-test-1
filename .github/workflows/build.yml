name: Build APK (Python-for-Android)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        build-essential libffi-dev libssl-dev python3-dev wget

    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install cython python-for-android kivy

    - name: Install Android SDK (FIX API + AIDL SAFE)
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-*.zip

        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ || true

        export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses

        sdkmanager "platform-tools"
        sdkmanager "platforms;android-33"
        sdkmanager "build-tools;33.0.2"

    - name: Build APK
      run: |
        export ANDROIDSDK=$HOME/android-sdk
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROIDSDK/platform-tools

        p4a apk \
          --private . \
          --package=org.example.myapp \
          --name="MyApp" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy \
          --arch=arm64-v8a

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "*.apk"
