name: Build APK (Kivy Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # CHECKOUT REPO
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # PYTHON
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # =========================
    # DEPENDENCIES
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        git zip unzip openjdk-17-jdk \
        build-essential \
        autoconf automake libtool m4 \
        libffi-dev libssl-dev python3-dev \
        cmake

    # =========================
    # INSTALL BUILDOZER (PIN VERSION BIAR STABIL)
    # =========================
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36
        pip install buildozer==1.5.0

    # =========================
    # CLEAN CACHE (IMPORTANT)
    # =========================
    - name: Clean cache
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      env:
        BUILDOZER_ALLOW_ROOT: 1
        DEBIAN_FRONTEND: noninteractive
      run: |
        buildozer init || true
        buildozer android debug -v

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
