name: Build APK (Stable P4A)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. CHECKOUT
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # 2. PYTHON SETUP
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # =========================
    # 3. SYSTEM DEPENDENCIES (FIX AUTOTOOLS ERROR)
    # =========================
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        git zip unzip wget curl \
        openjdk-17-jdk \
        build-essential \
        autoconf automake libtool m4 pkg-config \
        libffi-dev libssl-dev python3-dev \
        cmake

    # =========================
    # 4. PYTHON DEPENDENCIES
    # =========================
    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install cython kivy python-for-android

    # =========================
    # 5. FIX AUTOTOOLS CACHE (IMPORTANT FOR LIBFFI ERROR)
    # =========================
    - name: Fix autotools
      run: |
        autoreconf --install || true

    # =========================
    # 6. BUILD APK USING P4A
    # =========================
    - name: Build APK
      run: |
        p4a apk \
          --private . \
          --package=org.example.myapp \
          --name="MyApp" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy \
          --arch=arm64-v8a

    # =========================
    # 7. UPLOAD RESULT
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "*.apk"
