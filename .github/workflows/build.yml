- name: Install Pinned Android SDK (STABLE)
  run: |
    set -e

    export ANDROID_SDK_ROOT=$HOME/android-sdk

    mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

    cd /tmp

    # =========================
    # PINNED CMDLINE TOOLS
    # =========================
    wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmd.zip
    unzip -q cmd.zip

    mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest

    export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

    # =========================
    # FIX LICENSE (NON-INTERACTIVE)
    # =========================
    yes | sdkmanager --licenses || true

    # =========================
    # INSTALL PINNED SDK COMPONENTS
    # =========================
    sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
      "platform-tools" \
      "platforms;android-33" \
      "build-tools;33.0.2"

    # =========================
    # VERIFY (IMPORTANT)
    # =========================
    ls $ANDROID_SDK_ROOT/build-tools/33.0.2/aidl
