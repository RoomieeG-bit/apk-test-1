name: Build APK (FINAL FIX ALL)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DEBIAN_FRONTEND: noninteractive
      BUILDOZER_ALLOW_ROOT: 1

    steps:

    # =========================
    # CHECKOUT
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # PYTHON SETUP
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # =========================
    # SYSTEM DEPENDENCIES
    # =========================
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip wget curl \
          openjdk-17-jdk \
          build-essential autoconf automake libtool m4 \
          libffi-dev libssl-dev python3-dev cmake

    # =========================
    # PYTHON PACKAGES
    # =========================
    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install cython buildozer kivy python-for-android

    # =========================
    # CLEAN BUILDOZER TOTAL (IMPORTANT FIX AIDL ISSUE)
    # =========================
    - name: Clean Buildozer completely
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      run: |
        set -e

        buildozer android clean
        buildozer -v android debug

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
