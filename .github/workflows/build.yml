name: Build APK (NO SDK OVERRIDE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILDOZER_ALLOW_ROOT: 1
      DEBIAN_FRONTEND: noninteractive
      ANDROIDSDK: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      P4A_ANDROIDSDK: ${{ github.workspace }}/android-sdk

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y git zip unzip wget curl openjdk-17-jdk \
        build-essential autoconf automake libtool m4 \
        libffi-dev libssl-dev python3-dev cmake

    - name: Install Python deps
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36 buildozer==1.5.0

    # =========================
    # MANUAL ANDROID SDK (LOCK 34)
    # =========================
    - name: Install Android SDK MANUAL (LOCKED)
      run: |
        mkdir -p $ANDROIDSDK/cmdline-tools
        cd $ANDROIDSDK

        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-*.zip -d cmdline-tools
        mv cmdline-tools/cmdline-tools cmdline-tools/latest

        export PATH=$ANDROIDSDK/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses || true

        sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"

    # =========================
    # CRITICAL FIX: DISABLE BUILDOZER SDK AUTO-INSTALL
    # =========================
    - name: Force buildozer config override
      run: |
        mkdir -p .buildozer
        echo "[app]" > buildozer.spec.tmp || true

    - name: Clean cache
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer
        rm -rf bin

    - name: Build APK (NO SDK REINSTALL)
      run: |
        buildozer android debug -v

    - name: Debug output
      run: |
        ls -R bin || true
