name: Build APK (IMMUNE MODE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies (SAFE MODE)
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip curl wget \
          build-essential autoconf automake libtool pkg-config \
          openjdk-17-jdk

    - name: Setup Android SDK (NO AIDL ERROR ZONE)
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip

        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ || true

        export ANDROID_SDK_ROOT=$HOME/android-sdk
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses || true

        sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"

    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer kivy

    - name: Build APK (IMMUNE BUILD)
      run: |
        buildozer init || true
        buildozer -v android debug || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
