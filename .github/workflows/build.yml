name: Build APK (FINAL STABLE CLEAN)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILDOZER_ALLOW_ROOT: 1
      DEBIAN_FRONTEND: noninteractive

    steps:
    # =========================
    # CHECKOUT
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # PYTHON SETUP
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # =========================
    # SYSTEM DEPENDENCIES (FULL TOOLCHAIN)
    # =========================
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        git zip unzip wget curl \
        openjdk-17-jdk \
        build-essential \
        autoconf automake libtool m4 pkg-config \
        libffi-dev libssl-dev python3-dev \
        cmake

    # =========================
    # INSTALL BUILDOZER
    # =========================
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36 buildozer==1.5.0

    # =========================
    # CLEAN CACHE (FIX CORRUPT ENV)
    # =========================
    - name: Clean build cache
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer

    # =========================
    # INSTALL ANDROID SDK + ACCEPT LICENSES + FIX AIDL
    # =========================
    - name: Setup Android SDK
      run: |
        yes | sdkmanager --licenses || true

        sdkmanager "platform-tools"
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"

        sdkmanager --list | grep "build-tools" || true

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      run: |
        buildozer init || true
        buildozer android debug -v

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
