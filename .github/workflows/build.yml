name: Build APK (AIDL FIX FINAL)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DEBIAN_FRONTEND: noninteractive
      BUILDOZER_ALLOW_ROOT: 1

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip wget curl \
          openjdk-17-jdk \
          build-essential autoconf automake libtool m4 \
          libffi-dev libssl-dev python3-dev cmake

    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install cython buildozer kivy python-for-android

    # 🔥 FORCE CLEAN
    - name: Clean buildozer
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer

    # 🔥 FORCE INSTALL ANDROID BUILD-TOOLS (FIX AIDL ROOT)
    - name: Install Android build-tools manually
      run: |
        set -e

        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $ANDROID_HOME

        cd /tmp

        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
        unzip -q cmdline.zip

        mkdir -p $ANDROID_HOME/cmdline-tools/latest
        mv cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/

        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses || true

        sdkmanager --sdk_root=$ANDROID_HOME \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"

    # 🔥 FORCE BUILD (PASTI ADA AIDL)
    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
