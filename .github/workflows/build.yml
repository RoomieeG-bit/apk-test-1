name: Build APK (STABLE FIX AIDL + SDK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DEBIAN_FRONTEND: noninteractive
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      BUILDOZER_ALLOW_ROOT: 1

    steps:

    # =========================
    # CHECKOUT
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # PYTHON
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # =========================
    # SYSTEM DEPENDENCIES
    # =========================
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip wget curl \
          openjdk-17-jdk \
          build-essential autoconf automake libtool m4 \
          libffi-dev libssl-dev python3-dev cmake

    # =========================
    # PYTHON PACKAGES
    # =========================
    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install cython buildozer kivy python-for-android

    # =========================
    # INSTALL ANDROID SDK (FIX CMDLINE TOOLS + AIDL ROOT CAUSE FIX)
    # =========================
    - name: Install Android SDK (FIXED)
      run: |
        set -e

        mkdir -p $ANDROID_SDK_ROOT
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

        cd $ANDROID_SDK_ROOT

        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        rm cmdline.zip

        # FIX STRUCTURE (NO DOUBLE NESTING)
        rm -rf $ANDROID_SDK_ROOT/cmdline-tools/latest
        mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest

        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses || true

        sdkmanager --update

        sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"

    # =========================
    # EXPORT ENV (IMPORTANT FOR BUILD)
    # =========================
    - name: Export env
      run: |
        echo "ANDROIDSDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "ANDROIDAPI=34" >> $GITHUB_ENV
        echo "ANDROIDMINAPI=21" >> $GITHUB_ENV
        echo "PATH=$ANDROID_SDK_ROOT/platform-tools:$PATH" >> $GITHUB_ENV

    # =========================
    # CLEAN BUILD
    # =========================
    - name: Clean build
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      run: |
        buildozer -v android debug

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
