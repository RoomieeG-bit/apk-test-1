name: Build APK FIX AIDL FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DEBIAN_FRONTEND: noninteractive
      BUILDOZER_ALLOW_ROOT: 1
      ANDROIDSDK: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git zip unzip wget curl openjdk-17-jdk \
        build-essential autoconf automake libtool m4 \
        libffi-dev libssl-dev python3-dev cmake

    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36 buildozer==1.5.0

    # =========================
    # ANDROID SDK FIXED LOCATION
    # =========================
    - name: Install Android SDK (FORCED PATH)
      run: |
        mkdir -p $ANDROIDSDK
        cd $ANDROIDSDK

        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-*.zip -d cmdline-tools
        mv cmdline-tools/cmdline-tools cmdline-tools/latest

        export PATH=$ANDROIDSDK/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses || true

        sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"

    # =========================
    # FORCE BUILDOZER TO USE SAME SDK
    # =========================
    - name: Link SDK to Buildozer
      run: |
        mkdir -p ~/.buildozer/android/platform
        ln -s $ANDROIDSDK ~/.buildozer/android/platform/android-sdk || true

    - name: Clean
      run: |
        rm -rf .buildozer
        rm -rf bin

    # =========================
    # BUILD
    # =========================
    - name: Build APK
      run: |
        export ANDROIDAPI=34
        export ANDROIDMINAPI=21
        export ANDROIDSDK=$ANDROIDSDK
        export ANDROID_SDK_ROOT=$ANDROIDSDK

        buildozer android debug -v

    - name: Debug output
      run: |
        ls -R bin || true
