workflows:
  build-apk:

    name: Build APK

    environment:
      vars:
        PYTHON_VERSION: "3.10"

    scripts:

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        script: |
          python3 -m pip install --upgrade pip

          pip install setuptools==69.5.1

          pip install cython==0.29.36
          pip install buildozer==1.5.0

          pip install kivy==2.3.0
          pip install kivymd

      # =========================
      # CLEAN CACHE
      # =========================
      - name: Clean cache
        script: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      # =========================
      # FORCE SDK SETTINGS
      # =========================
      - name: Patch buildozer.spec
        script: |

          # 🔥 FORCE API 34
          sed -i.bak 's/android.api = .*/android.api = 34/g' buildozer.spec || true

          # 🔥 FORCE MIN API
          sed -i.bak 's/android.minapi = .*/android.minapi = 21/g' buildozer.spec || true

          # 🔥 REMOVE OLD BUILDTOOLS
          sed -i.bak '/android.sdk/d' buildozer.spec || true
          sed -i.bak '/android.ndk/d' buildozer.spec || true
          sed -i.bak '/android.build_tools_version/d' buildozer.spec || true

          # 🔥 FORCE STABLE SDK
          echo "android.sdk = 34" >> buildozer.spec
          echo "android.ndk = 25b" >> buildozer.spec
          echo "android.build_tools_version = 34.0.0" >> buildozer.spec

          # 🔥 AUTO ACCEPT LICENSE
          echo "android.accept_sdk_license = True" >> buildozer.spec

      # =========================
      # INSTALL ANDROID SDK MANUALLY
      # =========================
      - name: Install Android SDK
        script: |

          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk

          mkdir -p $ANDROID_HOME

          yes | sdkmanager --licenses || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # =========================
      # BUILD APK
      # =========================
      - name: Build APK
        script: |

          export ANDROIDAPI=34
          export ANDROIDMINAPI=21

          buildozer android clean

          buildozer -v android debug

    # =========================
    # APK OUTPUT
    # =========================
    artifacts:
      - bin/*.apk
