workflows:
  build-apk:

    name: Build APK FINAL FIX

    environment:
      vars:
        PYTHON_VERSION: "3.10"

    scripts:

      # =========================
      # INSTALL PYTHON TOOLS
      # =========================
      - name: Install dependencies
        script: |
          python3 -m pip install --upgrade pip

          pip install setuptools==69.5.1

          pip install cython==0.29.36
          pip install buildozer==1.5.0

          pip install kivy==2.3.0
          pip install kivymd

      # =========================
      # CLEAN CACHE
      # =========================
      - name: Clean cache
        script: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      # =========================
      # INSTALL ANDROID SDK
      # =========================
      - name: Install Android SDK
        script: |

          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk

          rm -rf $ANDROID_HOME

          mkdir -p $ANDROID_HOME

          cd $HOME

          wget https://dl.google.com/android/repository/commandlinetools-mac-11076708_latest.zip -O tools.zip

          unzip -q tools.zip

          mkdir -p $ANDROID_HOME/cmdline-tools

          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest

          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

          # 🔥 FIX BUILDOZER LEGACY SDK PATH
          mkdir -p $ANDROID_HOME/tools/bin

          ln -sf \
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            $ANDROID_HOME/tools/bin/sdkmanager

          # 🔥 VERIFY AIDL EXISTS
          ls $ANDROID_HOME/build-tools/34.0.0/aidl

      # =========================
      # PATCH BUILDOZER.SPEC
      # =========================
      - name: Patch buildozer.spec
        script: |

          sed -i.bak '/android.sdk/d' buildozer.spec || true
          sed -i.bak '/android.ndk/d' buildozer.spec || true
          sed -i.bak '/android.api/d' buildozer.spec || true
          sed -i.bak '/android.minapi/d' buildozer.spec || true
          sed -i.bak '/android.build_tools_version/d' buildozer.spec || true

          echo "android.api = 34" >> buildozer.spec
          echo "android.minapi = 21" >> buildozer.spec
          echo "android.sdk = 34" >> buildozer.spec
          echo "android.ndk = 25b" >> buildozer.spec
          echo "android.build_tools_version = 34.0.0" >> buildozer.spec

          # 🔥 STOP LICENSE ASK LOOP
          echo "android.accept_sdk_license = True" >> buildozer.spec

      # =========================
      # BUILD APK
      # =========================
      - name: Build APK
        script: |

          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk

          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          export ANDROIDAPI=34
          export ANDROIDMINAPI=21

          # 🔥 FORCE BUILDTOOLS VERSION
          export ANDROID_BUILD_TOOLS_VERSION=34.0.0

          buildozer android clean

          buildozer -v android debug

    # =========================
    # OUTPUT APK
    # =========================
    artifacts:
      - bin/*.apk
